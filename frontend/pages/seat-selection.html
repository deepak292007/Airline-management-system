<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection / SSS Airlines</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .container {
            padding: 120px 5%;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .plane-fuselage {
            background: linear-gradient(180deg, rgba(26,5,13,0.8) 0%, rgba(92,15,43,0.3) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 200px 200px 40px 40px;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .cabin-title {
            color: var(--secondary);
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--glass-border);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }

        .aisle {
            width: 40px;
        }

        .seat {
            width: 45px;
            height: 50px;
            background: rgba(40, 40, 40, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px 8px 4px 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            font-weight: 600;
        }

        .seat::before { 
            content: '';
            position: absolute;
            left: -3px; right: -3px;
            top: 40%;
            height: 5px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 2px;
        }

        .seat:hover:not(.booked) {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--secondary);
            transform: translateY(-4px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .seat.selected {
            background: linear-gradient(135deg, var(--secondary) 0%, #b8860b 100%);
            color: #1a050d;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transform: scale(1.1);
        }

        .seat.selected::before { background: rgba(0,0,0,0.2); }

        .seat.booked {
            background: rgba(255, 255, 255, 0.05);
            border-color: transparent;
            color: transparent;
            cursor: not-allowed;
            overflow: hidden;
            opacity: 0.5;
        }
        
        .seat.booked::after {
            content: '×';
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        .summary-panel {
            position: sticky;
            top: 120px;
            height: fit-content;
            padding: 2.5rem;
            border-top: 4px solid var(--secondary);
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .legend {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 3rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="texture-overlay"></div>
    </div>
    
    <nav>
        <a href="../index.html" class="logo">
            <i class="fa-solid fa-crown" style="font-size: 1.5rem;"></i> SSS<span>Airlines</span>
        </a>
    </nav>

    <div class="container">
        <!-- Plane Fuselage -->
        <div class="plane-fuselage glass-panel">
            <h2 style="margin-bottom: 3rem; font-size: 2.5rem; color: var(--secondary);">Choose Your Space</h2>
            
            <div id="seatMapContainer" style="width: 100%;">
                <!-- Dynamic seats inject here -->
            </div>
            
            <div class="legend">
                <div class="legend-item"><div style="width: 25px; height: 25px; background: rgba(40,40,40,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;"></div> Available</div>
                <div class="legend-item"><div style="width: 25px; height: 25px; background: var(--secondary); border-radius: 4px;"></div> Selected</div>
                <div class="legend-item"><div style="width: 25px; height: 25px; background: rgba(255,255,255,0.05); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2);">×</div> Booked</div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-panel glass-panel">
            <h2 style="margin-bottom: 2rem; color: var(--secondary); font-size: 1.8rem;">Your Selection</h2>
            
            <div class="summary-item">
                <span class="text-muted" style="text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Flight</span>
                <strong id="summary-flight" style="font-size: 1.2rem; font-family: 'Playfair Display';">Loading...</strong>
            </div>
            <div class="summary-item">
                <span class="text-muted" style="text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Cabin</span>
                <strong id="summary-class" style="color: var(--secondary); font-size: 1.1rem;">Loading...</strong>
            </div>
            <div class="summary-item">
                <span class="text-muted" style="text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Seat</span>
                <strong id="summary-seat" style="font-size: 1.5rem; font-family: 'Playfair Display'; color: var(--secondary);">None</strong>
            </div>
            <div class="summary-item" style="border-bottom: none;">
                <span class="text-muted" style="text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Total Fare</span>
                <strong id="summary-price" style="font-size: 2rem; font-family: 'Playfair Display';">₹ 0</strong>
            </div>

            <button id="proceedBtn" class="btn-primary" style="width: 100%; margin-top: 1rem; padding: 1.2rem; font-size: 1.1rem;" disabled>Confirm & Pay</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        const token = localStorage.getItem('token');

        if (!token) window.location.href = 'login.html?redirect=seat-selection.html';

        const flightId = sessionStorage.getItem('selectedFlight');
        const basePrice = Number.parseInt(sessionStorage.getItem('selectedPrice') || '0', 10);
        const cabinClass = sessionStorage.getItem('selectedClass') || 'Economy';
        const seatMapContainer = document.getElementById('seatMapContainer');
        const summaryClass = document.getElementById('summary-class');
        const summaryFlight = document.getElementById('summary-flight');
        const summarySeat = document.getElementById('summary-seat');
        const summaryPrice = document.getElementById('summary-price');
        const proceedBtn = document.getElementById('proceedBtn');
        const CABIN_LAYOUTS = {
            Business: { rows: 4, cols: ['A', 'C', 'D', 'F'], aisleIndex: 2 },
            'Premium Economy': { rows: 6, cols: ['A', 'B', 'C', 'D', 'E', 'F'], aisleIndex: 3 },
            Economy: { rows: 15, cols: ['A', 'B', 'C', 'D', 'E', 'F'], aisleIndex: 3 }
        };
        let selectedSeat = '';

        if (!flightId) window.location.href = '../index.html';

        summaryFlight.innerText = 'Selected Flight';
        summaryClass.innerText = cabinClass;
        summaryPrice.innerText = `₹${basePrice.toLocaleString()}`;

        const postJson = (url, body) => fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify(body)
        });

        const getRandomlyBookedSeats = (rows, cols) => {
            const booked = new Set();
            const limit = Math.floor(rows * cols.length * 0.3);

            while (booked.size < limit) {
                booked.add(`${Math.floor(Math.random() * rows) + 1}${cols[Math.floor(Math.random() * cols.length)]}`);
            }

            return booked;
        };

        function generateSeatMap() {
            const { rows, cols, aisleIndex } = CABIN_LAYOUTS[cabinClass] || CABIN_LAYOUTS.Economy;
            const randomlyBooked = getRandomlyBookedSeats(rows, cols);

            seatMapContainer.innerHTML = `
                <div class="cabin-section">
                    <div class="cabin-title">${cabinClass}</div>
                    ${Array.from({ length: rows }, (_, rowIndex) => `
                        <div class="seat-row">
                            ${cols.map((col, index) => {
                                const seatId = `${rowIndex + 1}${col}`;
                                const aisle = index === aisleIndex ? '<div class="aisle"></div>' : '';
                                const bookedClass = randomlyBooked.has(seatId) ? 'booked' : '';
                                return `${aisle}<div class="seat ${bookedClass}" data-seat="${seatId}">${seatId}</div>`;
                            }).join('')}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        seatMapContainer.addEventListener('click', (event) => {
            const seat = event.target.closest('.seat:not(.booked)');
            if (!seat) return;

            seatMapContainer.querySelector('.seat.selected')?.classList.remove('selected');
            seat.classList.add('selected');
            selectedSeat = seat.dataset.seat;
            summarySeat.innerText = selectedSeat;
            proceedBtn.disabled = false;
        });

        proceedBtn.addEventListener('click', async () => {
            if (!selectedSeat) return;

            proceedBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing Secure Payment...';
            proceedBtn.disabled = true;

            try {
                const bookRes = await postJson(`${API_BASE}/booking/create`, { flightId, seatNumber: selectedSeat, class: cabinClass });
                const bookingData = await bookRes.json();
                if (!bookRes.ok) throw new Error(bookingData.error || 'Failed to create booking');

                await new Promise((resolve) => setTimeout(resolve, 2000));

                const payRes = await postJson(`${API_BASE}/booking/payment/process`, { bookingId: bookingData._id, amount: basePrice });
                const payData = await payRes.json();
                if (!payRes.ok) throw new Error(payData.error || 'Payment failed');

                sessionStorage.setItem('ticketData', JSON.stringify(payData.booking));
                window.location.href = 'ticket.html';
            } catch (error) {
                alert(error.message);
                proceedBtn.innerText = 'Confirm & Pay';
                proceedBtn.disabled = false;
            }
        });

        generateSeatMap();
    </script>
</body>
</html>
